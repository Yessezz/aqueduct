// Generate 90 days of cash-flow data
const generateCashFlow = () => {
  const data = [];
  let baseline = 32; // total liquidity in $M
  for (let d = 0; d <= 90; d++) {
    const weekday = d % 7;
    const fridayBoost = weekday === 4 ? 1.8 : 1.0;
    const monthEnd = (d % 30) > 26 ? 1.4 : 1.0;
    const noise = (Math.sin(d * 0.7) + Math.cos(d * 1.3) * 0.5) * 0.8;
    const inflow  = 4.2 * fridayBoost * monthEnd + noise;
    const outflow = 4.1 * fridayBoost * monthEnd + noise * 0.9 + (weekday === 4 ? 1.2 : 0);
    baseline += (inflow - outflow) * 0.3;
    const forecast = baseline + Math.sin(d * 0.3) * 0.5;
    const upper = forecast + 1.8 + d * 0.04;
    const lower = forecast - 1.8 - d * 0.04;
    data.push({
      day: d,
      actual: d <= 60 ? +baseline.toFixed(2) : null,
      forecast: d >= 55 ? +forecast.toFixed(2) : null,
      upper:    d >= 55 ? +upper.toFixed(2) : null,
      lower:    d >= 55 ? +lower.toFixed(2) : null,
      inflow:  +inflow.toFixed(2),
      outflow: +outflow.toFixed(2),
    });
  }
  return data;
};

// STRESS LAB

const StressLab = () => {
  const [swiftDelay, setSwiftDelay] = useState(0);   // 0-7 days
  const [payoutSpike, setPayoutSpike] = useState(0); // 0-50%
  const [fxVol, setFxVol] = useState(0);             // 0-30%

  // Simulate stress impact
  const baseGapProb = 3.2;
  const gapProb = Math.min(99, baseGapProb + swiftDelay * 6 + payoutSpike * 0.8 + fxVol * 0.3);
  const baseLCR = 134;
  const lcr = Math.max(70, baseLCR - swiftDelay * 4 - payoutSpike * 0.6 - fxVol * 0.2);
  const baseNSFR = 118;
  const nsfr = Math.max(80, baseNSFR - swiftDelay * 2 - payoutSpike * 0.4 - fxVol * 0.15);
  const maxOverdraft = Math.max(0, swiftDelay * 0.4 + payoutSpike * 0.06 + fxVol * 0.02);
  const recommendedBuffer = Math.max(4, 4 + swiftDelay * 0.6 + payoutSpike * 0.08);

  // Stressed forecast
  const stressedForecast = useMemo(() => {
    return CASH_FLOW_14D.map((d, i) => {
      const stressFactor = (swiftDelay * 0.15 + payoutSpike * 0.012 + fxVol * 0.008);
      const stressed = (d.forecast ?? d.actual ?? 32) - i * stressFactor;
      return { ...d, stressed: +stressed.toFixed(2) };
    });
  }, [swiftDelay, payoutSpike, fxVol]);

  const Gauge = ({ label, value, suffix, max, danger, warn, color }) => {
    const pct = Math.min(100, (value / max) * 100);
    const c = value > danger ? C.red : value > warn ? C.yellow : color;
    return (
      <div className="glass rounded-xl p-4">
        <div className="text-[10px] uppercase tracking-widest mb-2" style={{color: C.textDim}}>{label}</div>
        <div className="flex items-baseline gap-1">
          <span className="mono text-3xl font-bold smooth" style={{ color: c, textShadow: `0 0 14px ${c}80` }}>{value.toFixed(1)}</span>
          <span className="mono text-sm" style={{ color: C.textDim }}>{suffix}</span>
        </div>
        <div className="mt-2 h-1.5 rounded-full overflow-hidden" style={{ background: C.border }}>
          <div className="h-full smooth" style={{ width: `${pct}%`, background: c, boxShadow: `0 0 8px ${c}` }}/>
        </div>
      </div>
    );
  };

  const SliderRow = ({ label, value, setValue, min, max, unit, hint, color }) => (
    <div className="glass rounded-xl p-4">
      <div className="flex items-center justify-between mb-2">
        <div>
          <div className="text-sm font-semibold">{label}</div>
          <div className="text-[10px]" style={{color: C.textDim}}>{hint}</div>
        </div>
        <div className="mono text-2xl font-bold" style={{ color, textShadow: `0 0 12px ${color}80` }}>
          {value}{unit}
        </div>
      </div>
      <input type="range" min={min} max={max} value={value} onChange={(e) => setValue(+e.target.value)} className="w-full"/>
      <div className="flex justify-between text-[10px] mono mt-1" style={{color: C.textDim}}>
        <span>{min}{unit}</span>
        <span>{max}{unit}</span>
      </div>
    </div>
  );

  const verdict = gapProb < 15 ? { color: C.green,  label: 'SYSTEM STABLE',   detail: 'Aqueduct withstands the scenario without overdraft.' }
               : gapProb < 50 ? { color: C.yellow, label: 'ELEVATED RISK',   detail: 'Pre-fund EUR-DB and increase smart reserve to $6M.' }
                              : { color: C.red,    label: 'CRITICAL EXPOSURE',detail: 'Overdraft inevitable. Tap credit line or pause non-critical payouts.' };

  return (
    <div className="px-6 py-4">
      <div className="glass rounded-2xl p-6 mb-4 bg-grid">
        <div className="text-[10px] uppercase tracking-[0.3em] mb-1" style={{color: C.blue}}>▲ Stress Lab</div>
        <h1 className="text-3xl font-bold tracking-tight">Monte Carlo · 10,000 scenarios</h1>
        <p className="text-sm mt-1" style={{color: C.textDim}}>
          Stress the system in real time. Aqueduct recomputes LCR, NSFR, gap probability and recommended buffer instantly.
        </p>
      </div>

      <div className="grid grid-cols-3 gap-4 mb-4">
        <SliderRow label="SWIFT delay" value={swiftDelay} setValue={setSwiftDelay} min={0} max={7} unit="d" hint="Extra clearing days on inbound flows" color={C.blue}/>
        <SliderRow label="Payout spike" value={payoutSpike} setValue={setPayoutSpike} min={0} max={50} unit="%" hint="Unexpected merchant payout surge" color={C.yellow}/>
        <SliderRow label="FX volatility" value={fxVol} setValue={setFxVol} min={0} max={30} unit="%" hint="EUR/USD intraday swing" color="#A66DFF"/>
      </div>

      <div className="grid grid-cols-4 gap-3 mb-4">
        <Gauge label="Cash-gap probability (7d)" value={gapProb} suffix="%"  max={100} danger={50} warn={20} color={C.green}/>
        <Gauge label="LCR (Basel III · min 100%)"  value={lcr}    suffix="%"  max={150} danger={100} warn={110} color={C.green}/>
        <Gauge label="NSFR (Basel III · min 100%)" value={nsfr}   suffix="%"  max={150} danger={100} warn={110} color={C.green}/>
        <Gauge label="Max overdraft needed" value={maxOverdraft} suffix="M" max={10}  danger={3}   warn={1}   color={C.green}/>
      </div>

      <div className="grid grid-cols-3 gap-4">
        <Section title="Stressed 14-day forecast" subtitle="Blue: base · Red: under stress" className="col-span-2">
          <div style={{height: 220}}>
            <ResponsiveContainer>
              <ComposedChart data={stressedForecast} margin={{top: 10, right: 10, left: 0, bottom: 0}}>
                <CartesianGrid stroke={C.border} strokeDasharray="2 4" vertical={false}/>
                <XAxis dataKey="day" stroke={C.textDim} fontSize={10}/>
                <YAxis stroke={C.textDim} fontSize={10} tickFormatter={v => `$${v}M`}/>
                <Tooltip contentStyle={{background: C.panel, border: `1px solid ${C.border}`, borderRadius: 8, fontSize: 11}}/>
                <Line type="monotone" dataKey="forecast"  stroke={C.blue} strokeWidth={2} strokeDasharray="4 3" dot={false}/>
                <Line type="monotone" dataKey="stressed" stroke={C.red}  strokeWidth={2.5} dot={false}/>
                <ReferenceLine y={recommendedBuffer} stroke={C.yellow} strokeDasharray="2 4" label={{ value: `Buffer $${recommendedBuffer.toFixed(1)}M`, fill: C.yellow, fontSize: 10, position: 'right' }}/>
              </ComposedChart>
            </ResponsiveContainer>
          </div>
        </Section>

        <Section title="Aqueduct verdict" subtitle="Auto-generated mitigation plan">
          <div className="rounded-xl p-4 mb-3" style={{ background: verdict.color + '15', border: `1px solid ${verdict.color}40`, boxShadow: `0 0 24px ${verdict.color}30` }}>
            <Pill color={verdict.color} glow>{verdict.label}</Pill>
            <div className="text-sm mt-2 font-medium">{verdict.detail}</div>
          </div>
          <div className="space-y-2 text-xs">
            <div className="flex justify-between p-2 rounded glass">
              <span style={{color: C.textDim}}>Recommended smart reserve</span>
              <span className="mono font-bold" style={{color: C.blue}}>${recommendedBuffer.toFixed(1)}M</span>
            </div>
            <div className="flex justify-between p-2 rounded glass">
              <span style={{color: C.textDim}}>Yield-deployable surplus</span>
              <span className="mono font-bold" style={{color: C.green}}>${Math.max(0, 15 - recommendedBuffer).toFixed(1)}M</span>
            </div>
            <div className="flex justify-between p-2 rounded glass">
              <span style={{color: C.textDim}}>Scenarios simulated</span>
              <span className="mono font-bold">10,000</span>
            </div>
            <div className="flex justify-between p-2 rounded glass">
              <span style={{color: C.textDim}}>VaR @ 95% confidence</span>
              <span className="mono font-bold" style={{color: C.yellow}}>${(maxOverdraft * 1.5 + 0.4).toFixed(2)}M</span>
            </div>
          </div>
        </Section>
      </div>
    </div>
  );
};

            <div className="flex-shrink-0 w-24 text-center">
              <div className="mono text-[10px]" style={{color: C.textDim}}>LAYER {i+1}</div>
              <div className="text-2xl font-black tracking-tight mt-1" style={{color: l.color, textShadow: `0 0 16px ${l.color}80`}}>{l.name}</div>
            </div>
            <div className="flex-1">
              <div className="text-sm font-semibold mb-1" style={{color: l.color}}>{l.tagline}</div>
              <div className="text-sm mb-3" style={{color: C.textMid}}>{l.desc}</div>
              <div className="flex flex-wrap gap-2">
                {l.tech.map(t => (
                  <span key={t} className="px-2.5 py-1 rounded mono text-[10px]"
                        style={{background: l.color + '15', color: l.color, border: `1px solid ${l.color}30`}}>{t}</span>
                ))}
              </div>
            </div>
            <div className="flex-shrink-0 text-right">
              <div className="text-[10px] uppercase tracking-widest" style={{color: C.textDim}}>Output</div>
              <div className="text-xs font-medium mt-1 mono" style={{color: l.color}}>{l.output}</div>
            </div>
          </div>
        ))}
      </div>

      <div className="grid grid-cols-3 gap-4 mt-4">
        <Section title="Data flow" subtitle="How information moves through the stack">
          <div className="space-y-3 text-xs">
            <div className="flex items-center gap-3"><span className="mono w-6" style={{color:C.blue}}>1.</span><span>Bank APIs stream live balances and transactions every 60s</span></div>
            <div className="flex items-center gap-3"><span className="mono w-6" style={{color:C.blue}}>2.</span><span>PREDICT generates rolling forecasts with confidence intervals</span></div>
            <div className="flex items-center gap-3"><span className="mono w-6" style={{color:C.blue}}>3.</span><span>PROTECT stress-tests the forecast against 10K scenarios</span></div>
            <div className="flex items-center gap-3"><span className="mono w-6" style={{color:C.blue}}>4.</span><span>OPTIMIZE proposes routing plans, EARN proposes yield plans</span></div>
            <div className="flex items-center gap-3"><span className="mono w-6" style={{color:C.blue}}>5.</span><span>EXPLAIN wraps each proposal with SHAP rationale</span></div>
            <div className="flex items-center gap-3"><span className="mono w-6" style={{color:C.blue}}>6.</span><span>Treasurer approves or rejects · audit trail persisted</span></div>
          </div>
        </Section>
        <Section title="Tech stack" subtitle="Production-grade tooling">
          <div className="grid grid-cols-2 gap-2 text-xs">
            {[
              ['Backend', 'Python · FastAPI'],
              ['ML', 'PyTorch · scikit-learn'],
              ['Forecasting', 'Prophet · Stable-Baselines3'],
              ['Explainability', 'SHAP'],
              ['Frontend', 'React · TypeScript'],
              ['Charts', 'Recharts · D3'],
              ['Database', 'PostgreSQL · Redis'],
              ['Infra', 'Docker · AWS'],
            ].map(([k, v]) => (
              <div key={k} className="p-2 rounded glass">
                <div className="text-[10px]" style={{color: C.textDim}}>{k}</div>
                <div className="text-xs font-semibold mono">{v}</div>
              </div>
            ))}
          </div>
        </Section>
        <Section title="Why this stack" subtitle="Defensible technical choices">
          <div className="space-y-2 text-xs" style={{color: C.textMid}}>
            <p><b style={{color:C.text}}>Ensemble forecasting</b> beats single models on financial time series (Makridakis competitions, 2020).</p>
            <p><b style={{color:C.text}}>PPO over DQN</b> for continuous action spaces — better for amount-based routing decisions.</p>
            <p><b style={{color:C.text}}>SHAP over LIME</b> — game-theoretic foundation, consistent attribution.</p>
            <p><b style={{color:C.text}}>Basel III built-in</b> — moat for clients on regulatory path to banking license.</p>
          </div>
        </Section>
      </div>
    </div>
  );
};
